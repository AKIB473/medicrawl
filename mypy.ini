[mypy]
python_version = 3.13
ignore_missing_imports = True
warn_unused_configs = True
disallow_untyped_defs = False

# Suppress specific external library type issues
[mypy-orjson.*]
ignore_errors = True

[mypy-curl_cffi.*]
ignore_errors = True

[mypy-scrapling.*]
ignore_errors = True

[mypy-playwright.*]
ignore_errors = True

[mypy-cloudscraper.*]
ignore_errors = True

[mypy-httpx.*]
ignore_errors = True

# Suppress override incompatibility for async generators (common pattern)
[mypy-scrapers.base]
disable_error_code = override

[mypy-scrapers.bangladesh.*]
disable_error_code = override

[mypy-scrapers.international.*]
disable_error_code = override

[mypy-scrapers.research.*]
disable_error_code = override