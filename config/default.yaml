# Centralized configuration for medicrawl-advanced

scrapers:
  # Global default concurrency (overridden per-source below)
  default_concurrency: 10

  # Default timeouts (seconds)
  request_timeout: 30
  scraper_timeout: 900  # 15 minutes per source

  # Retry settings
  max_retries: 3
  retry_base_delay: 1.0
  retry_max_delay: 60.0
  retry_jitter: true

  # Rate limiting
  rate_limit_default: 1.0
  rate_limit_aggressive: 0.5  # for sensitive sites

  # Checkpointing
  checkpoint_enabled: true
  checkpoint_interval: 100  # save every N drugs
  checkpoint_retention_days: 7

  # Caching
  cache_enabled: true
  cache_ttl_seconds: 3600  # 1 hour
  cache_max_size_mb: 500

  # Circuit breaker
  circuit_breaker_enabled: true
  circuit_breaker_threshold: 5  # failures before trip
  circuit_breaker_timeout: 300  # 5 min cooldown

# Per-source overrides
sources:
  drugbank:
    concurrency: 5
    rate_limit: 3.0
    timeout: 1800  # 30 minutes (many pages)
    max_pages: 200  # default pages to scrape
    use_stealth: true

  drugs_com:
    concurrency: 8
    rate_limit: 1.5
    timeout: 900  # 15 minutes
    max_urls: 5000

  rxlist:
    concurrency: 6
    rate_limit: 2.0
    timeout: 1200
    use_stealth: true

  openfda:
    concurrency: 20  # API, can handle more
    rate_limit: 0.2  # FDA rate limit
    timeout: 300

  pubchem:
    concurrency: 15
    rate_limit: 0.5
    timeout: 600

  chembl:
    concurrency: 20
    rate_limit: 0.3
    timeout: 300

  webmd:
    concurrency: 4
    rate_limit: 2.5
    timeout: 1800
    use_stealth: true

  medscape:
    concurrency: 4
    rate_limit: 2.5
    timeout: 1800
    use_stealth: true

  epocrates:
    concurrency: 4
    rate_limit: 2.0
    timeout: 1800

  mims:
    concurrency: 3
    rate_limit: 3.0
    timeout: 1800
    use_stealth: true

  # Bangladesh sources (generally faster)
  medex:
    concurrency: 12
    rate_limit: 1.0
    timeout: 600

  dims:
    concurrency: 10
    rate_limit: 1.0
    timeout: 600

  bdmedex:
    concurrency: 8
    rate_limit: 1.0
    timeout: 600

  # Research databases
  drugbank:
    concurrency: 5
    rate_limit: 3.0
    timeout: 1800

# GitHub Actions specific
github_actions:
  job_timeout_minutes: 60  # Reduced from 360
  matrix_parallelism: 8  # max concurrent matrix jobs
  shard_timeout_minutes: 30  # per shard timeout

# Logging
logging:
  level: INFO
  rich_tracebacks: true
  log_file: logs/medicrawl.log
  rotate_bytes: 10485760  # 10MB
  keep_logs: 5

# Output
output:
  data_dir: data
  format:
    - jsonl  # line-delimited JSON
    - sqlite  # merged DB
  compression: gzip  # compress raw outputs
  pretty: false

# Monitoring
monitoring:
  metrics_file: metrics.json
  progress_interval: 10  # seconds
  enable_prometheus: false
