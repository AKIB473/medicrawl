[mypy]
python_version = 3.13
ignore_missing_imports = True
warn_unused_configs = True
disallow_untyped_defs = False

# External libraries - suppress all errors
[mypy-curl_cffi.*]
ignore_errors = True

[mypy-scrapling.*]
ignore_errors = True

[mypy-playwright.*]
ignore_errors = True

[mypy-orjson.*]
ignore_errors = True

[mypy-cloudscraper.*]
ignore_errors = True

[mypy-lxml.*]
ignore_errors = True